[build]
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "dist"

# Set VITE_API_URL in Netlify dashboard > Site settings > Environment variables
# Example: https://digitaldelivery-backend.onrender.com

# SPA: redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
